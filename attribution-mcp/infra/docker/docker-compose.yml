version: "3.9"

services:
  attribution-mcp:
    build:
      context: ../../
      dockerfile: mcp-server/Dockerfile
    container_name: attribution-mcp
    ports:
      - "8001:8001"
    env_file: ../../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - attribution-net

  attribution-agent:
    build:
      context: ../../
      dockerfile: agent/Dockerfile
    container_name: attribution-agent
    ports:
      - "8000:8000"
    env_file: ../../.env
    environment:
      MCP_SERVER_URL: http://attribution-mcp:8001/sse
    depends_on:
      attribution-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - attribution-net

networks:
  attribution-net:
    driver: bridge
