version: "3.9"

services:
  # ── MCP Server (Snowflake backend) ──────────────────────
  mcp-server:
    build:
      context: ../../
      dockerfile: mcp-server/Dockerfile
    container_name: mcp-server
    ports:
      - "8001:8001"
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - ai-net

  # ── AI Agent (OpenAI Agents SDK) ────────────────────────
  agent:
    build:
      context: ../../
      dockerfile: agent/Dockerfile
    container_name: agent
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      # Override MCP URL to use Docker service name
      MCP_SERVER_URL: http://mcp-server:8001/sse
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - ai-net

networks:
  ai-net:
    driver: bridge
